@if (hasError) {
  @if (message()) {
    <span class="text-red-600 text-sm" [attr.id]="id()">{{ message() }}</span>
  }

  @if (messages()) {
    <div class="flex flex-col gap-0.5" [attr.id]="id()">
      @for (message of messages(); track $index) {
        <span class="text-red-600 text-sm">{{ message }}</span>
      }
    </div>
  }
}
