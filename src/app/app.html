@if (isAuthenticated()) {
  <nz-layout class="min-h-dvh bg-app">
    <nz-sider
      class="bg-app border-e border-e-dove-gray-400"
      [nzCollapsed]="isCollapsed()"
      [nzWidth]="200"
      [nzCollapsedWidth]="64"
    >
      <app-sider (collapsedChange)="onCollapsedChange($event)" />
    </nz-sider>
    <nz-content class="px-0.5 py-2 md:p-4">
      <router-outlet />
    </nz-content>
  </nz-layout>
} @else {
  <router-outlet />
}
