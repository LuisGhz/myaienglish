@if (isAuthenticated()) {
  @if (isMobile() && !isCollapsed()) {
    <div
      class="backdrop-menu"
      (click)="collapseFromBackdrop()"
      aria-label="Backdrop menu"
      [aria-hidden]="!isMobile() || isCollapsed()"
    ></div>
  }
  <div class="min-h-dvh bg-[#0a111d]">
    <nz-layout class="workspace-shell min-h-dvh w-full overflow-hidden">
    <nz-sider
        class="workspace-sider static border-e border-slate-400/10 md:relative"
        [nzCollapsedWidth]="collapsedWidth()"
        [nzCollapsed]="isCollapsed()"
        [nzWidth]="expandedWidth()"
        [class.absolute-menu]="isMobile()"
      >
        <app-sider />
      </nz-sider>
      <nz-layout class="workspace-main min-w-0">
        @if (isMobile()) {
          <nz-header class="flex h-16 items-center border-b border-slate-400/10 bg-slate-950/90 px-4">
            <app-header />
          </nz-header>
        }
        <nz-content class="min-h-full bg-transparent p-4 md:p-8">
          <router-outlet />
        </nz-content>
      </nz-layout>
    </nz-layout>
  </div>
} @else {
  <router-outlet />
}
