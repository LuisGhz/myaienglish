<header class="flex h-full items-center gap-3" role="banner" aria-label="Workspace header">
  @if (isMenuCollapsed()) {
    <button
      class="wcag-outline flex h-10 w-10 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-slate-100 transition hover:border-sky-400/30 hover:bg-sky-500/10"
      type="button"
      (click)="onExpandMenu()"
      aria-label="Open navigation menu"
      aria-expanded="false"
    >
      <nz-icon class="text-xl" nzType="menu-unfold" nzTheme="outline" aria-hidden="true" />
    </button>
  }
  <div class="flex flex-col">
    <span class="text-sm font-semibold text-slate-100">My AI English</span>
  </div>
</header>
