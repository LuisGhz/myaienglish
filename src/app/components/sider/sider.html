<nav class="h-full flex flex-col">
  <div class="flex justify-end p-2">
    <button
      (click)="toggleCollapse()"
      class="text-white hover:text-dove-gray-100 focus:ring-2 focus:ring-gray-400 rounded p-1 transition-colors duration-200"
      [attr.aria-label]="isCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
      [attr.title]="isCollapsed() ? 'Expand sidebar' : 'Collapse sidebar'"
    >
      <nz-icon [nzType]="collapseIcon()" nzTheme="outline" class="text-xl" />
    </button>
  </div>

  <ul class="py-5 flex-1">
    <li>
      <a
        class="app-link app-link-bg-hover text-lg cursor-pointer block rounded px-2 py-1 focus:ring-2 wcag-outline"
        routerLink="translate"
        [attr.title]="isCollapsed() ? 'Translate' : null"
        aria-label="Translate"
      >
        @if (isCollapsed()) {
          <span class="text-center block">T</span>
        } @else {
          <span>Translate</span>
        }
      </a>
    </li>
    <li>
      <a
        class="app-link app-link-bg-hover text-lg cursor-pointer block rounded px-2 py-1 focus:ring-2 wcag-outline"
        routerLink="translate"
        [attr.title]="isCollapsed() ? 'Translate' : null"
        aria-label="Translate"
      >
        @if (isCollapsed()) {
          <span class="text-center block">T</span>
        } @else {
          <span>VS</span>
        }
      </a>
    </li>
  </ul>
  <ul class="mb-3 p-2 border-t border-dove-gray-200 text-app flex justify-end wcag-outline">
    <li>
      <button class="cursor-pointer flex gap-2 p-0.5" type="button" (click)="logout()">
        <nz-icon class="text-lg" nzType="logout" nzTheme="outline" />
        <span>Logout</span>
      </button>
    </li>
  </ul>
</nav>
