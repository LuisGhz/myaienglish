<main class="h-full flex flex-col gap-4" [formGroup]="translateForm">
  <section>
    <nz-select formControlName="instructionId" class="w-60">
      @for (instruction of $instructions.value(); track $index) {
      <nz-option [nzLabel]="instruction.name" [nzValue]="instruction.id"></nz-option>
      }
    </nz-select>
  </section>
  <section>
    <label class="text-white" for="additional-context">Additional context</label>
    <textarea
      formControlName="context"
      id="additional-context"
      nz-input
      [nzAutosize]="{ minRows: 3, maxRows: 3 }"
    ></textarea>
  </section>
  <section class="flex flex-col md:flex-row gap-2">
    <div class="w-full md:w-1/2">
      <label class="text-white" for="text-to-translate">Text to translate:</label>
      <textarea
        formControlName="textToTranslate"
        id="text-to-translate"
        nz-input
        [nzAutosize]="{ minRows: 4, maxRows: 4 }"
      ></textarea>
    </div>
    <div class="w-full md:w-1/2 relative">
      @if (translatedText() !== '') {
      <div class="p-4 text-white text-lg rounded-md">
        <button class="absolute top-0 right-0" (click)="addFavoriteTranslation()" aria-label="Add translation to favorites">
          <nz-icon nzType="heart" nzTheme="twotone" nzTwotoneColor="#eb2f96" />
        </button>
        <markdown>
          {{ translatedText() }}
        </markdown>
      </div>
      @if (tokenInfo()) {
      <div class="mt-3 p-3 rounded-md text-sm text-dove-gray-200 border border-blue-400">
        <p class="font-semibold mb-2">Token Usage</p>
        <div class="grid grid-cols-3 gap-2">
          <div>
            <span>Input:</span>
            <p class="font-medium">{{ tokenInfo()!.inputTokens }}</p>
          </div>
          <div>
            <span>Output:</span>
            <p class="font-medium">{{ tokenInfo()!.outputTokens }}</p>
          </div>
          <div>
            <span>Total:</span>
            <p class="font-medium">{{ tokenInfo()!.totalTokens }}</p>
          </div>
        </div>
      </div>
      } }
    </div>
  </section>
  <section class="flex justify-center">
    <button
      (click)="onTranslate()"
      [disabled]="translateForm.invalid"
      class="wcag-outline w-40"
      aria-label="Translate text"
      nz-button
      nzType="primary"
      [nzLoading]="isLoading()"
    >
      {{ isLoading() ? 'Translating...' : 'Translate' }}
    </button>
  </section>
</main>
