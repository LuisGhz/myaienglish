<ul>
  @for (translation of $favTranslations.value(); track $index) {
  <li class="mb-4 p-4 pt-8 rounded-md bg-dove-gray-800 relative">
    <button
      class="absolute top-1 right-3 !text-xl text-red-600 cursor-pointer"
      (click)="removeFavoriteTranslation(translation.id)"
      aria-label="Remove translation from favorites"
    >
      <nz-icon nzType="close" nzTheme="outline" />
    </button>
    <h3 class="text-white font-semibold mb-2">Original Text:</h3>
    <p class="text-dove-gray-200 mb-4">{{ translation.originalText }}</p>
    <h3 class="text-white font-semibold mb-2">Translated Text:</h3>
    <markdown class="text-dove-gray-200">
      {{ translation.translatedText }}
    </markdown>
  </li>
  }
</ul>
